<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professional Hero Animation</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: 'Arial', sans-serif;
    background: #0d1117;
    color: #fff;
  }

  #canvas {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    pointer-events: none;
  }

  .hero-content h1 {
    font-size: 3rem;
    margin: 0;
    opacity: 0;
    transform: translateY(50px);
    animation: fadeInUp 1s forwards 0.5s;
  }

  .hero-content p {
    font-size: 1.5rem;
    margin: 20px 0 0;
    opacity: 0;
    transform: translateY(50px);
    animation: fadeInUp 1s forwards 1s;
  }

  @keyframes fadeInUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes fadeInScale {
    to {
      opacity: 1;
      transform: scale(1);
    }
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="hero-content">
  <h1>Welcome to Our Platform</h1>
  <p>Professional solutions powered by cutting-edge technology.</p>
</div>

<script src="script.js"></script>
</body>
</html>
