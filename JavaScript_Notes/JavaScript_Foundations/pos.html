<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>POS Tap Animation</title>

<style>

body{
  background:#1b1f26;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial;
}

.pos{
  width:280px;
  height:360px;
  background:linear-gradient(145deg,#3c4049,#22262e);
  border-radius:20px;
  padding:20px;
  box-shadow:0 25px 50px rgba(0,0,0,0.7);
  position:relative;
}

/* SCREEN */

.screen{
  height:110px;
  background:#061a24;
  border-radius:10px;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:#9dfcff;
  font-size:18px;
  padding:10px;
  box-shadow:inset 0 0 20px black;
}

/* DEFAULT TEXT */

.idle{
  position:absolute;
  animation:idleText 6s infinite;
}

/* DECLINED MESSAGE */

.message{
  position:absolute;
  color:#ff6b6b;
  opacity:0;
  animation:showMsg 6s infinite;
}

@keyframes idleText{

0%,45%{opacity:1}

55%,100%{opacity:0}

}

@keyframes showMsg{

0%,45%{opacity:0}

55%,90%{opacity:1}

100%{opacity:0}

}

/* TAP AREA */

.tap{
  width:90px;
  height:90px;
  border-radius:50%;
  border:3px dashed #aaa;
  margin:25px auto;
  position:relative;
}

.signal{
  position:absolute;
  width:60px;
  height:60px;
  border-radius:50%;
  border:3px solid #7df9ff;
  top:15px;
  left:15px;
  opacity:0;
  animation:signal 1.5s infinite;
}

@keyframes signal{

0%{transform:scale(.6);opacity:.8}
100%{transform:scale(1.6);opacity:0}

}

/* CARD */

.card{
  width:120px;
  height:75px;
  background:linear-gradient(135deg,#4a8bff,#1f49b6);
  border-radius:8px;
  position:absolute;
  left:80px;
  top:-140px;
  box-shadow:0 10px 20px rgba(0,0,0,0.6);
  animation:tapCard 6s infinite;
}

.chip{
  width:18px;
  height:14px;
  background:gold;
  margin:12px;
  border-radius:2px;
}

@keyframes tapCard{

0%{top:-140px}

40%{top:135px}

55%{top:135px}

70%{top:-140px}

100%{top:-140px}

}

/* KEYPAD */

.keypad{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  width:160px;
  margin:0 auto;
}

.key{
  height:32px;
  background:linear-gradient(#ddd,#aaa);
  border-radius:5px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
  font-size:13px;
}

</style>
</head>

<body>

<div class="pos">

<div class="screen">
<div class="idle">Tap Card</div>
<div class="message">Card Declined!<br>Insufficient Funds</div>
</div>

<div class="tap">
<div class="signal"></div>
</div>

<div class="keypad">
<div class="key">1</div>
<div class="key">2</div>
<div class="key">3</div>
<div class="key">4</div>
<div class="key">5</div>
<div class="key">6</div>
<div class="key">7</div>
<div class="key">8</div>
<div class="key">9</div>
</div>

<div class="card">
<div class="chip"></div>
</div>

</div>

</body>
</html>
