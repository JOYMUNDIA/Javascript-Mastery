<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Pizza Modulo</title>

<style>

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#faf3e6;
  font-family:Arial;
}

svg{
  width:760px;
}

.slice path{
  stroke:white;
  stroke-width:2;
}

/* toppings */

.pepperoni{
  fill:#b22222;
}

.olive{
  fill:none;
  stroke:#111;
  stroke-width:3;
}

.cheese{
  stroke:#ffd86a;
  stroke-width:3;
}

.pepper{
  fill:none;
  stroke:#2e8b57 !important;
  stroke-width:3;
}

.plate{
  fill:white;
  stroke:#ddd;
  stroke-width:6;
}

/* tooltip-mod bubble styling */

.tooltip-mod {
  color: #fff;
  font-size: 18px;
  max-width: 28ch;
  text-align: center;
  position:absolute;
  left:50%;
  top:40px;
  transform:translateX(-50%);
  opacity:0;
}

.tooltip-mod {
  --s: 1.5em;
  --p: 50%;
  --r: 1em;

  padding: 1em;
  border: var(--s) solid #0000;
  border-radius: calc(var(--r) + var(--s));
  background: border-box linear-gradient(60deg,#818181,#036a63);
  --_m: 100%/var(--s) var(--s) no-repeat;
  --_p: clamp(var(--r) + 3*var(--s)/2,var(--p),100% - var(--r) - 3*var(--s)/2);

  -webkit-mask:
    linear-gradient(#000 0 0) padding-box,
    radial-gradient(100% 100% at 100% 100%,#0000 99%,#000 102%) calc(var(--_p) + var(--s)/2) var(--_m),
    radial-gradient(100% 100% at 0 100%,#0000 99%,#000 102%) calc(var(--_p) - var(--s)/2) var(--_m);

    mask:
    linear-gradient(#000 0 0) padding-box,
    radial-gradient(100% 100% at 100% 100%,#0000 99%,#000 102%) calc(var(--_p) + var(--s)/2) var(--_m),
    radial-gradient(100% 100% at 0 100%,#0000 99%,#000 102%) calc(var(--_p) - var(--s)/2) var(--_m);

}



/* first explanation bubble */

.intro-mod{
  animation:intro-modBubble 11s forwards;
}

/* modulus bubble */

.modulus{
  top:100px;
  animation:modBubble 4s 11s forwards;
}

@keyframes intro-modBubble{
  0%{opacity:0}
  5%{opacity:1}
  90%{opacity:1}
  100%{opacity:0}
}

@keyframes modBubble{
  from{opacity:0}
  to{opacity:1}
}

</style>
</head>

<body>

<!-- intro-mod bubble -->

<div class="tooltip-mod intro-mod">
Suppose you want to share a 10 sliced pizza among 3 people
</div>

<!-- modulus bubble -->

<div class="tooltip-mod modulus">
This remainder is what we call the modulus. Modulus is simply the remainder after division.
</div>

<svg viewBox="0 0 760 420">

<defs>
  <radialGradient id="pizzaGradient" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#f5d29c"/>
    <stop offset="70%" stop-color="#d88b4a"/>
    <stop offset="100%" stop-color="#a45c2b"/>
  </radialGradient>
</defs>

<!-- plates -->

<circle class="plate" cx="150" cy="300" r="60"/>
<circle class="plate" cx="380" cy="300" r="60"/>
<circle class="plate" cx="610" cy="300" r="60"/>

<!-- pizza -->

<g transform="translate(380 140) scale(2.3)">

<!-- slice 1 -->
<g class="slice">
<path fill="url(#pizzaGradient)" d="M0 0 L0 -50 A50 50 0 0 1 29 -40 Z"/>
<circle class="pepperoni" cx="8" cy="-25" r="5"/>
<circle class="olive" cx="16" cy="-18" r="3"/>
<line class="cheese" x1="5" y1="-15" x2="20" y2="-30"/>
<path class="pepper" d="M15 -10 Q20 -5 25 -10"/>
<animateTransform attributeName="transform" type="translate"
values="0 0; -100 85" begin="1s" dur="1s" fill="freeze"/>
</g>

<!-- slice 2 -->
<g class="slice">
<path fill="url(#pizzaGradient)" d="M0 0 L29 -40 A50 50 0 0 1 47 -15 Z"/>
<circle class="pepperoni" cx="25" cy="-18" r="5"/>
<circle class="olive" cx="18" cy="-10" r="3"/>
<line class="cheese" x1="20" y1="-25" x2="35" y2="-12"/>
<path class="pepper" d="M30 -5 Q35 0 40 -5"/>
<animateTransform attributeName="transform" type="translate"
values="0 0; 0 85" begin="2s" dur="1s" fill="freeze"/>
</g>

<!-- slice 3 -->
<g class="slice">
<path fill="url(#pizzaGradient)" d="M0 0 L47 -15 A50 50 0 0 1 47 15 Z"/>
<circle class="pepperoni" cx="32" cy="0" r="5"/>
<circle class="olive" cx="20" cy="5" r="3"/>
<line class="cheese" x1="10" y1="-5" x2="35" y2="5"/>
<path class="pepper" d="M25 10 Q35 12 40 5"/>
<animateTransform attributeName="transform" type="translate"
values="0 0; 100 85" begin="3s" dur="1s" fill="freeze"/>
</g>

<!-- slice 4 -->
<g class="slice">
<path fill="url(#pizzaGradient)" d="M0 0 L47 15 A50 50 0 0 1 29 40 Z"/>
<circle class="pepperoni" cx="28" cy="20" r="5"/>
<circle class="olive" cx="15" cy="15" r="3"/>
<line class="cheese" x1="20" y1="10" x2="30" y2="25"/>
<path class="pepper" d="M30 30 Q25 25 20 30"/>
<animateTransform attributeName="transform" type="translate"
values="0 0; -100 80" begin="4s" dur="1s" fill="freeze"/>
</g>

<!-- slice 5 -->
<g class="slice">
<path fill="url(#pizzaGradient)" d="M0 0 L29 40 A50 50 0 0 1 0 50 Z"/>
<circle class="pepperoni" cx="10" cy="28" r="5"/>
<circle class="olive" cx="15" cy="18" r="3"/>
<line class="cheese" x1="5" y1="20" x2="20" y2="35"/>
<path class="pepper" d="M10 40 Q15 35 20 40"/>
<animateTransform attributeName="transform" type="translate"
values="0 0; 0 80" begin="5s" dur="1s" fill="freeze"/>
</g>

<!-- slice 6 -->
<g class="slice">
<path fill="url(#pizzaGradient)" d="M0 0 L0 50 A50 50 0 0 1 -29 40 Z"/>
<circle class="pepperoni" cx="-10" cy="28" r="5"/>
<circle class="olive" cx="-15" cy="18" r="3"/>
<line class="cheese" x1="-5" y1="25" x2="-20" y2="40"/>
<path class="pepper" d="M-10 40 Q-15 35 -20 40"/>
<animateTransform attributeName="transform" type="translate"
values="0 0; 100 80" begin="6s" dur="1s" fill="freeze"/>
</g>

<!-- slice 7 -->
<g class="slice">
<path fill="url(#pizzaGradient)" d="M0 0 L-29 40 A50 50 0 0 1 -47 15 Z"/>
<circle class="pepperoni" cx="-30" cy="20" r="5"/>
<circle class="olive" cx="-18" cy="15" r="3"/>
<line class="cheese" x1="-10" y1="15" x2="-35" y2="25"/>
<path class="pepper" d="M-30 30 Q-35 25 -40 30"/>
<animateTransform attributeName="transform" type="translate"
values="0 0; -100 75" begin="7s" dur="1s" fill="freeze"/>
</g>

<!-- slice 8 -->
<g class="slice">
<path fill="url(#pizzaGradient)" d="M0 0 L-47 15 A50 50 0 0 1 -47 -15 Z"/>
<circle class="pepperoni" cx="-32" cy="0" r="5"/>
<circle class="olive" cx="-20" cy="-5" r="3"/>
<line class="cheese" x1="-10" y1="-5" x2="-35" y2="5"/>
<path class="pepper" d="M-25 10 Q-35 12 -40 5"/>
<animateTransform attributeName="transform" type="translate"
values="0 0; 0 75" begin="8s" dur="1s" fill="freeze"/>
</g>

<!-- slice 9 -->
<g class="slice">
<path fill="url(#pizzaGradient)" d="M0 0 L-47 -15 A50 50 0 0 1 -29 -40 Z"/>
<circle class="pepperoni" cx="-25" cy="-18" r="5"/>
<circle class="olive" cx="-18" cy="-10" r="3"/>
<line class="cheese" x1="-20" y1="-25" x2="-35" y2="-12"/>
<path class="pepper" d="M-30 -5 Q-35 0 -40 -5"/>
<animateTransform attributeName="transform" type="translate"
values="0 0; 100 75" begin="9s" dur="1s" fill="freeze"/>
</g>

<!-- remainder slice -->
<g class="slice">
<path fill="url(#pizzaGradient)" d="M0 0 L-29 -40 A50 50 0 0 1 0 -50 Z"/>
<circle class="pepperoni" cx="-10" cy="-30" r="5"/>
<circle class="olive" cx="-5" cy="-20" r="3"/>
<line class="cheese" x1="-15" y1="-25" x2="-2" y2="-40"/>
<path class="pepper" d="M-8 -15 Q-3 -10 5 -15"/>
</g>

</g>

</svg>

</body>
</html>
